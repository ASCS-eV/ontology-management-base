# ASAM OpenLABEL Scenario Tagging Ontology v2
# Modeled in LinkML as single source of truth.
# Generates: OWL ontology, SHACL shapes, JSON-LD context.
#
# Based on ASAM OpenLABEL V1.0.0 (BSI PAS-1883) with ASCS-eV namespace.
# For details, see https://www.asam.net/project-detail/asam-openlabel-v100

id: https://w3id.org/ascs-ev/envited-x/openlabel/v2
name: openlabel-v2
title: ASAM OpenLABEL Scenario Tagging Ontology
description: >-
  Ontology for scenario tagging based on the ASAM OpenLABEL standard
  and BSI PAS-1883 Operational Design Domain taxonomy.
version: "2.0.0"
license: https://www.eclipse.org/legal/epl-2.0/

prefixes:
  linkml: https://w3id.org/linkml/
  openlabel_v2: https://w3id.org/ascs-ev/envited-x/openlabel/v2/
  sdo: https://schema.org/
  cmns-q: https://www.omg.org/spec/Commons/Quantities/

default_prefix: openlabel_v2
default_range: string

imports:
  - linkml:types

# =============================================================================
# Classes
# =============================================================================
classes:

  # ---------------------------------------------------------------------------
  # Scenario (top-level container)
  # ---------------------------------------------------------------------------
  Scenario:
    description: >-
      A scenario that can be tagged with OpenLABEL tags.
    class_uri: openlabel_v2:Scenario
    slots:
      - hasTag

  # ---------------------------------------------------------------------------
  # Tag (base tag - main entry point for SHACL validation)
  # ---------------------------------------------------------------------------
  Tag:
    description: The base tag.
    class_uri: openlabel_v2:Tag
    slots:
      - AdminTag
      - Behaviour
      - Odd
      - RoadUser

  # ---------------------------------------------------------------------------
  # AdminTag
  # ---------------------------------------------------------------------------
  AdminTag:
    description: >-
      The base tag to use when extending the Administration tags with new classes.
    class_uri: openlabel_v2:AdminTag
    slots:
      - licenseURI
      - ownerEmail
      - ownerName
      - ownerURL
      - scenarioCreatedDate
      - scenarioDefinition
      - scenarioDefinitionLanguageURI
      - scenarioDescription
      - scenarioName
      - scenarioParentReference
      - scenarioUniqueReference
      - scenarioVersion
      - scenarioVisualisationURL

  # ---------------------------------------------------------------------------
  # Behaviour
  # ---------------------------------------------------------------------------
  Behaviour:
    description: An activity performed by a road user.
    see_also:
      - https://www.bsigroup.com/en-GB/CAV/pas-1883
    class_uri: openlabel_v2:Behaviour
    slots:
      - BehaviourCommunication
      - MotionAccelerate
      - motionAccelerateValue
      - MotionAway
      - MotionCross
      - MotionCutIn
      - MotionCutOut
      - MotionDecelerate
      - motionDecelerateValue
      - MotionDrive
      - motionDriveValue
      - MotionLaneChangeLeft
      - MotionLaneChangeRight
      - MotionOvertake
      - MotionReverse
      - MotionRun
      - MotionSlide
      - MotionStop
      - MotionTowards
      - MotionTurn
      - MotionTurnLeft
      - MotionTurnRight
      - MotionUTurn
      - MotionWalk
    rules:
      - description: >-
          If motionAccelerateValue is provided, MotionAccelerate must be true.
          Corresponds to BSI PAS-1883 conditional constraint.
        preconditions:
          slot_conditions:
            motionAccelerateValue:
              value_presence: PRESENT
        postconditions:
          slot_conditions:
            MotionAccelerate:
              equals_string: "true"
      - description: >-
          If motionDecelerateValue is provided, MotionDecelerate must be true.
          Corresponds to BSI PAS-1883 conditional constraint.
        preconditions:
          slot_conditions:
            motionDecelerateValue:
              value_presence: PRESENT
        postconditions:
          slot_conditions:
            MotionDecelerate:
              equals_string: "true"
      - description: >-
          If motionDriveValue is provided, MotionDrive must be true.
          Corresponds to BSI PAS-1883 conditional constraint.
        preconditions:
          slot_conditions:
            motionDriveValue:
              value_presence: PRESENT
        postconditions:
          slot_conditions:
            MotionDrive:
              equals_string: "true"

  # ---------------------------------------------------------------------------
  # Odd (Operational Design Domain)
  # ---------------------------------------------------------------------------
  Odd:
    description: >-
      Operational Design Domain. Refer to BSI PAS-1883 Section 5.
    see_also:
      - https://www.bsigroup.com/en-GB/CAV/pas-1883
    class_uri: openlabel_v2:Odd
    slots:
      - ConnectivityCommunication
      - ConnectivityPositioning
      - DaySunElevation
      - daySunElevationValue
      - DaySunPosition
      - DrivableAreaEdge
      - DrivableAreaSurfaceCondition
      - DrivableAreaSurfaceFeature
      - DrivableAreaSurfaceType
      - DrivableAreaType
      - EnvironmentParticulates
      - GeometryTransverse
      - HorizontalCurves
      - horizontalCurvesValue
      - HorizontalStraights
      - IlluminationArtificial
      - IlluminationCloudiness
      - illuminationCloudinessValue
      - IlluminationLowLight
      - JunctionIntersection
      - JunctionRoundabout
      - LaneSpecificationDimensions
      - laneSpecificationDimensionsValue
      - LaneSpecificationLaneCount
      - laneSpecificationLaneCountValue
      - LaneSpecificationMarking
      - LaneSpecificationTravelDirection
      - LaneSpecificationType
      - LongitudinalDownSlope
      - longitudinalDownSlopeValue
      - LongitudinalLevelPlane
      - LongitudinalUpSlope
      - longitudinalUpSlopeValue
      - ParticulatesDust
      - ParticulatesMarine
      - ParticulatesPollution
      - ParticulatesVolcanic
      - particulatesWaterValue
      - RainType
      - SceneryFixedStructure
      - ScenerySpecialStructure
      - SceneryTemporaryStructure
      - SceneryZone
      - SignsInformation
      - SignsRegulatory
      - SignsWarning
      - SubjectVehicleSpeed
      - subjectVehicleSpeedValue
      - TrafficAgentDensity
      - trafficAgentDensityValue
      - TrafficAgentType
      - trafficAgentTypeValue
      - TrafficFlowRate
      - trafficFlowRateValue
      - TrafficSpecialVehicle
      - TrafficVolume
      - trafficVolumeValue
      - WeatherRain
      - weatherRainValue
      - WeatherSnow
      - weatherSnowValue
      - WeatherWind
      - weatherWindValue
    rules:
      - description: >-
          If weatherWindValue is provided, WeatherWind must be true.
          Corresponds to BSI PAS-1883 conditional constraint.
        preconditions:
          slot_conditions:
            weatherWindValue:
              value_presence: PRESENT
        postconditions:
          slot_conditions:
            WeatherWind:
              equals_string: "true"
      - description: >-
          If weatherRainValue is provided, WeatherRain must be true.
          Corresponds to BSI PAS-1883 conditional constraint.
        preconditions:
          slot_conditions:
            weatherRainValue:
              value_presence: PRESENT
        postconditions:
          slot_conditions:
            WeatherRain:
              equals_string: "true"
      - description: >-
          If weatherSnowValue is provided, WeatherSnow must be true.
          Corresponds to BSI PAS-1883 conditional constraint.
        preconditions:
          slot_conditions:
            weatherSnowValue:
              value_presence: PRESENT
        postconditions:
          slot_conditions:
            WeatherSnow:
              equals_string: "true"
      - description: >-
          If illuminationCloudinessValue is provided, IlluminationCloudiness must be true.
          Corresponds to BSI PAS-1883 conditional constraint.
        preconditions:
          slot_conditions:
            illuminationCloudinessValue:
              value_presence: PRESENT
        postconditions:
          slot_conditions:
            IlluminationCloudiness:
              equals_string: "true"
      - description: >-
          If daySunElevationValue is provided, DaySunElevation must be true.
          Corresponds to BSI PAS-1883 conditional constraint.
        preconditions:
          slot_conditions:
            daySunElevationValue:
              value_presence: PRESENT
        postconditions:
          slot_conditions:
            DaySunElevation:
              equals_string: "true"
      - description: >-
          If trafficAgentDensityValue is provided, TrafficAgentDensity must be true.
          Corresponds to BSI PAS-1883 conditional constraint.
        preconditions:
          slot_conditions:
            trafficAgentDensityValue:
              value_presence: PRESENT
        postconditions:
          slot_conditions:
            TrafficAgentDensity:
              equals_string: "true"
      - description: >-
          If trafficAgentTypeValue is provided, TrafficAgentType must be true.
          Corresponds to BSI PAS-1883 Section 5.4.a.4 conditional constraint.
        preconditions:
          slot_conditions:
            trafficAgentTypeValue:
              value_presence: PRESENT
        postconditions:
          slot_conditions:
            TrafficAgentType:
              equals_string: "true"
      - description: >-
          If trafficFlowRateValue is provided, TrafficFlowRate must be true.
          Corresponds to BSI PAS-1883 conditional constraint.
        preconditions:
          slot_conditions:
            trafficFlowRateValue:
              value_presence: PRESENT
        postconditions:
          slot_conditions:
            TrafficFlowRate:
              equals_string: "true"
      - description: >-
          If trafficVolumeValue is provided, TrafficVolume must be true.
          Corresponds to BSI PAS-1883 conditional constraint.
        preconditions:
          slot_conditions:
            trafficVolumeValue:
              value_presence: PRESENT
        postconditions:
          slot_conditions:
            TrafficVolume:
              equals_string: "true"
      - description: >-
          If laneSpecificationDimensionsValue is provided, LaneSpecificationDimensions must be true.
          Corresponds to BSI PAS-1883 conditional constraint.
        preconditions:
          slot_conditions:
            laneSpecificationDimensionsValue:
              value_presence: PRESENT
        postconditions:
          slot_conditions:
            LaneSpecificationDimensions:
              equals_string: "true"
      - description: >-
          If laneSpecificationLaneCountValue is provided, LaneSpecificationLaneCount must be true.
          Corresponds to BSI PAS-1883 conditional constraint.
        preconditions:
          slot_conditions:
            laneSpecificationLaneCountValue:
              value_presence: PRESENT
        postconditions:
          slot_conditions:
            LaneSpecificationLaneCount:
              equals_string: "true"
      - description: >-
          If horizontalCurvesValue is provided, HorizontalCurves must be true.
          Corresponds to BSI PAS-1883 conditional constraint.
        preconditions:
          slot_conditions:
            horizontalCurvesValue:
              value_presence: PRESENT
        postconditions:
          slot_conditions:
            HorizontalCurves:
              equals_string: "true"
      - description: >-
          If longitudinalDownSlopeValue is provided, LongitudinalDownSlope must be true.
          Corresponds to BSI PAS-1883 conditional constraint.
        preconditions:
          slot_conditions:
            longitudinalDownSlopeValue:
              value_presence: PRESENT
        postconditions:
          slot_conditions:
            LongitudinalDownSlope:
              equals_string: "true"
      - description: >-
          If longitudinalUpSlopeValue is provided, LongitudinalUpSlope must be true.
          Corresponds to BSI PAS-1883 conditional constraint.
        preconditions:
          slot_conditions:
            longitudinalUpSlopeValue:
              value_presence: PRESENT
        postconditions:
          slot_conditions:
            LongitudinalUpSlope:
              equals_string: "true"

  # ---------------------------------------------------------------------------
  # RoadUser
  # ---------------------------------------------------------------------------
  RoadUser:
    description: Something which uses a road to travel.
    see_also:
      - https://www.bsigroup.com/en-GB/CAV/pas-1883
    class_uri: openlabel_v2:RoadUser
    slots:
      - RoadUserAnimal
      - RoadUserHuman
      - RoadUserVehicle
      - motionDriveValue

  # ---------------------------------------------------------------------------
  # QuantitativeValue (from schema.org, used for range values)
  # ---------------------------------------------------------------------------
  QuantitativeValue:
    description: >-
      A point value or interval for quantitative measurements.
      Requires minValue and maxValue.
    class_uri: sdo:QuantitativeValue
    slots:
      - minValue
      - maxValue
      - hasLowerBound
      - hasUpperBound


# =============================================================================
# Slots (properties)
# =============================================================================
slots:

  # ---------------------------------------------------------------------------
  # Scenario slots
  # ---------------------------------------------------------------------------
  hasTag:
    description: A tag associated with a scenario.
    slot_uri: openlabel_v2:hasTag
    range: Tag

  # ---------------------------------------------------------------------------
  # Tag composition slots (references to sub-shapes)
  # ---------------------------------------------------------------------------
  AdminTag:
    description: Administration tag.
    slot_uri: openlabel_v2:AdminTag
    range: AdminTag
    inlined: true

  Behaviour:
    description: Behaviour tag.
    slot_uri: openlabel_v2:Behaviour
    range: Behaviour
    inlined: true

  Odd:
    description: Operational Design Domain tag.
    slot_uri: openlabel_v2:Odd
    range: Odd
    inlined: true

  RoadUser:
    description: Road user tag.
    slot_uri: openlabel_v2:RoadUser
    range: RoadUser
    inlined: true

  # ---------------------------------------------------------------------------
  # AdminTag slots (all rdfs:Literal in v1)
  # ---------------------------------------------------------------------------
  licenseURI:
    description: The type of license which governs usage of the scenario.
    slot_uri: openlabel_v2:licenseURI
    range: string

  ownerEmail:
    description: The email address of the legal entity who owns the rights to the scenario.
    slot_uri: openlabel_v2:ownerEmail
    range: string

  ownerName:
    description: The name of the legal entity who owns the rights to the scenario.
    slot_uri: openlabel_v2:ownerName
    range: string

  ownerURL:
    description: The URL of the legal entity who owns the rights to the scenario.
    slot_uri: openlabel_v2:ownerURL
    range: string

  scenarioCreatedDate:
    description: The date that the scenario was created/published.
    slot_uri: openlabel_v2:scenarioCreatedDate
    range: datetime

  scenarioDefinition:
    description: SDL definition of the scenario.
    slot_uri: openlabel_v2:scenarioDefinition
    range: string

  scenarioDefinitionLanguageURI:
    description: URI of SDL language used for the definition of the scenario.
    slot_uri: openlabel_v2:scenarioDefinitionLanguageURI
    range: string

  scenarioDescription:
    description: A description of the scenario.
    slot_uri: openlabel_v2:scenarioDescription
    range: string

  scenarioName:
    description: The name of the scenario.
    slot_uri: openlabel_v2:scenarioName
    range: string

  scenarioParentReference:
    description: >-
      Universally unique identifier (UUID) which identifies the scenario
      which this one has been derived from.
    slot_uri: openlabel_v2:scenarioParentReference
    range: string

  scenarioUniqueReference:
    description: >-
      Universally unique identifier (UUID) assigned to the scenario which
      allows the scenario to be identified.
    slot_uri: openlabel_v2:scenarioUniqueReference
    range: string

  scenarioVersion:
    description: The version number of the scenario.
    slot_uri: openlabel_v2:scenarioVersion
    range: string

  scenarioVisualisationURL:
    description: >-
      Relative or absolute URL of a static image or animation of the scenario
      to allow users to easily see what the scenario represents.
    slot_uri: openlabel_v2:scenarioVisualisationURL
    range: string

  # ---------------------------------------------------------------------------
  # Behaviour enum slots
  # ---------------------------------------------------------------------------
  BehaviourCommunication:
    description: Communication type of road user behaviour.
    slot_uri: openlabel_v2:BehaviourCommunication
    range: BehaviourCommunicationEnum
    multivalued: true

  # ---------------------------------------------------------------------------
  # Behaviour boolean slots (motion flags)
  # ---------------------------------------------------------------------------
  MotionAccelerate:
    description: An activity where the road user increases their velocity.
    slot_uri: openlabel_v2:MotionAccelerate
    range: boolean

  MotionAway:
    description: An activity where the road user is further away from the object by the end.
    slot_uri: openlabel_v2:MotionAway
    range: boolean

  MotionCross:
    description: An activity where the trajectory of the road user crosses the trajectory of the object.
    slot_uri: openlabel_v2:MotionCross
    range: boolean

  MotionCutIn:
    description: An activity where the subject vehicle ends up directly in front of the object vehicle.
    slot_uri: openlabel_v2:MotionCutIn
    range: boolean

  MotionCutOut:
    description: An activity where the object vehicle suddenly moves out of the lane.
    slot_uri: openlabel_v2:MotionCutOut
    range: boolean

  MotionDecelerate:
    description: An activity where the road user decreases their velocity.
    slot_uri: openlabel_v2:MotionDecelerate
    range: boolean

  MotionDrive:
    description: An activity where the subject vehicle is moving in the direction it is facing.
    slot_uri: openlabel_v2:MotionDrive
    range: boolean

  MotionLaneChangeLeft:
    description: An activity where the subject vehicle is in a lane left of the original.
    slot_uri: openlabel_v2:MotionLaneChangeLeft
    range: boolean

  MotionLaneChangeRight:
    description: An activity where the subject vehicle is in a lane right of the original.
    slot_uri: openlabel_v2:MotionLaneChangeRight
    range: boolean

  MotionOvertake:
    description: An activity where the subject starts behind and ends up in front by changing lanes.
    slot_uri: openlabel_v2:MotionOvertake
    range: boolean

  MotionReverse:
    description: An activity where the subject vehicle is moving in the opposite direction to which it is facing.
    slot_uri: openlabel_v2:MotionReverse
    range: boolean

  MotionRun:
    description: Locomotion mode where at a specific point no foot touches the ground.
    slot_uri: openlabel_v2:MotionRun
    range: boolean

  MotionSlide:
    description: An activity where a pedestrian is slipping/sliding on the road.
    slot_uri: openlabel_v2:MotionSlide
    range: boolean

  MotionStop:
    description: An activity where the road user is stationary.
    slot_uri: openlabel_v2:MotionStop
    range: boolean

  MotionTowards:
    description: An activity where the road user is closer to the object by the end.
    slot_uri: openlabel_v2:MotionTowards
    range: boolean

  MotionTurn:
    description: An activity where the road user changes their heading.
    slot_uri: openlabel_v2:MotionTurn
    range: boolean

  MotionTurnLeft:
    description: Subject exits the intersection on a road to the left of the original.
    slot_uri: openlabel_v2:MotionTurnLeft
    range: boolean

  MotionTurnRight:
    description: Subject exits the intersection on a road to the right of the original.
    slot_uri: openlabel_v2:MotionTurnRight
    range: boolean

  MotionUTurn:
    description: Subject performs a turn resulting in heading in the opposite direction.
    slot_uri: openlabel_v2:MotionUTurn
    range: boolean

  MotionWalk:
    description: Locomotion mode where at least one foot is always on the ground.
    slot_uri: openlabel_v2:MotionWalk
    range: boolean

  # ---------------------------------------------------------------------------
  # Behaviour value slots (decimal measurements)
  # ---------------------------------------------------------------------------
  motionAccelerateValue:
    description: Rate of acceleration (ms-2).
    slot_uri: openlabel_v2:motionAccelerateValue
    any_of:
      - range: decimal
      - range: QuantitativeValue

  motionDecelerateValue:
    description: Rate of deceleration (ms-2).
    slot_uri: openlabel_v2:motionDecelerateValue
    any_of:
      - range: decimal
      - range: QuantitativeValue

  motionDriveValue:
    description: Speed (km/h).
    slot_uri: openlabel_v2:motionDriveValue
    any_of:
      - range: decimal
      - range: QuantitativeValue

  # ---------------------------------------------------------------------------
  # ODD enum slots
  # ---------------------------------------------------------------------------
  ConnectivityCommunication:
    description: Communication connectivity type. Refer to BSI PAS-1883 Section 5.3.4.a.
    see_also:
      - https://www.bsigroup.com/en-GB/CAV/pas-1883
    slot_uri: openlabel_v2:ConnectivityCommunication
    range: ConnectivityCommunicationEnum

  ConnectivityPositioning:
    description: Positioning system type. Refer to BSI PAS-1883 Section 5.3.4.b.
    see_also:
      - https://www.bsigroup.com/en-GB/CAV/pas-1883
    slot_uri: openlabel_v2:ConnectivityPositioning
    range: ConnectivityPositioningEnum

  DrivableAreaEdge:
    description: Drivable area edge type. Refer to BSI PAS-1883 Section 5.2.3.1.e.
    see_also:
      - https://www.bsigroup.com/en-GB/CAV/pas-1883
    slot_uri: openlabel_v2:DrivableAreaEdge
    range: DrivableAreaEdgeEnum
    multivalued: true

  DrivableAreaSurfaceCondition:
    description: Road surface condition. Refer to BSI PAS-1883 Section 5.2.3.7.c.
    see_also:
      - https://www.bsigroup.com/en-GB/CAV/pas-1883
    slot_uri: openlabel_v2:DrivableAreaSurfaceCondition
    range: DrivableAreaSurfaceConditionEnum

  DrivableAreaSurfaceFeature:
    description: Road surface feature. Refer to BSI PAS-1883 Section 5.2.3.7.b.
    see_also:
      - https://www.bsigroup.com/en-GB/CAV/pas-1883
    slot_uri: openlabel_v2:DrivableAreaSurfaceFeature
    range: DrivableAreaSurfaceFeatureEnum

  DrivableAreaSurfaceType:
    description: Road surface type. Refer to BSI PAS-1883 Section 5.2.3.7.a.
    see_also:
      - https://www.bsigroup.com/en-GB/CAV/pas-1883
    slot_uri: openlabel_v2:DrivableAreaSurfaceType
    range: DrivableAreaSurfaceTypeEnum

  DrivableAreaType:
    description: Road type. Refer to BSI PAS-1883 Section 5.2.3.2.
    see_also:
      - https://www.bsigroup.com/en-GB/CAV/pas-1883
    slot_uri: openlabel_v2:DrivableAreaType
    range: DrivableAreaTypeEnum

  EnvironmentParticulates:
    description: Particulate type. Refer to BSI PAS-1883 Section 5.3.2.
    see_also:
      - https://www.bsigroup.com/en-GB/CAV/pas-1883
    slot_uri: openlabel_v2:EnvironmentParticulates
    range: EnvironmentParticulatesEnum

  GeometryTransverse:
    description: Transverse geometry type. Refer to BSI PAS-1883 Section 5.2.3.3.b.
    see_also:
      - https://www.bsigroup.com/en-GB/CAV/pas-1883
    slot_uri: openlabel_v2:GeometryTransverse
    range: GeometryTransverseEnum

  IlluminationArtificial:
    description: Artificial illumination type. Refer to BSI PAS-1883 Section 5.3.3.d.
    see_also:
      - https://www.bsigroup.com/en-GB/CAV/pas-1883
    slot_uri: openlabel_v2:IlluminationArtificial
    range: IlluminationArtificialEnum

  IlluminationLowLight:
    description: Low light condition. Refer to BSI PAS-1883 Section 5.3.3.b.
    see_also:
      - https://www.bsigroup.com/en-GB/CAV/pas-1883
    slot_uri: openlabel_v2:IlluminationLowLight
    range: IlluminationLowLightEnum

  JunctionIntersection:
    description: Intersection type. Refer to BSI PAS-1883 Section 5.2.4.
    see_also:
      - https://www.bsigroup.com/en-GB/CAV/pas-1883
    slot_uri: openlabel_v2:JunctionIntersection
    range: JunctionIntersectionEnum

  JunctionRoundabout:
    description: Roundabout type. Refer to BSI PAS-1883 Section 5.2.4.
    see_also:
      - https://www.bsigroup.com/en-GB/CAV/pas-1883
    slot_uri: openlabel_v2:JunctionRoundabout
    range: JunctionRoundaboutEnum

  LaneSpecificationTravelDirection:
    description: Direction of travel. Refer to BSI PAS-1883 Section 5.2.3.4.e.
    see_also:
      - https://www.bsigroup.com/en-GB/CAV/pas-1883
    slot_uri: openlabel_v2:LaneSpecificationTravelDirection
    range: LaneSpecificationTravelDirectionEnum

  LaneSpecificationType:
    description: Lane type. Refer to BSI PAS-1883 Section 5.2.3.4.c.
    see_also:
      - https://www.bsigroup.com/en-GB/CAV/pas-1883
    slot_uri: openlabel_v2:LaneSpecificationType
    range: LaneSpecificationTypeEnum
    multivalued: true

  RainType:
    description: Rainfall type. Refer to BSI PAS-1883 Section 5.3.1.2.
    see_also:
      - https://www.bsigroup.com/en-GB/CAV/pas-1883
    slot_uri: openlabel_v2:RainType
    range: RainTypeEnum

  SceneryFixedStructure:
    description: Fixed road structure. Refer to BSI PAS-1883 Section 5.2.1.e.
    see_also:
      - https://www.bsigroup.com/en-GB/CAV/pas-1883
    slot_uri: openlabel_v2:SceneryFixedStructure
    range: SceneryFixedStructureEnum

  ScenerySpecialStructure:
    description: Special road structure. Refer to BSI PAS-1883 Section 5.2.1.d.
    see_also:
      - https://www.bsigroup.com/en-GB/CAV/pas-1883
    slot_uri: openlabel_v2:ScenerySpecialStructure
    range: ScenerySpecialStructureEnum

  SceneryTemporaryStructure:
    description: Temporary road structure. Refer to BSI PAS-1883 Section 5.2.1.f.
    see_also:
      - https://www.bsigroup.com/en-GB/CAV/pas-1883
    slot_uri: openlabel_v2:SceneryTemporaryStructure
    range: SceneryTemporaryStructureEnum

  SceneryZone:
    description: Zone type. Refer to BSI PAS-1883 Section 5.2.1.a.
    see_also:
      - https://www.bsigroup.com/en-GB/CAV/pas-1883
    slot_uri: openlabel_v2:SceneryZone
    range: SceneryZoneEnum

  SignsInformation:
    description: Information sign type. Refer to BSI PAS-1883 Section 5.2.3.5.a.
    see_also:
      - https://www.bsigroup.com/en-GB/CAV/pas-1883
    slot_uri: openlabel_v2:SignsInformation
    range: SignsInformationEnum

  SignsRegulatory:
    description: Regulatory sign type. Refer to BSI PAS-1883 Section 5.2.3.5.b.
    see_also:
      - https://www.bsigroup.com/en-GB/CAV/pas-1883
    slot_uri: openlabel_v2:SignsRegulatory
    range: SignsRegulatoryEnum

  SignsWarning:
    description: Warning sign type. Refer to BSI PAS-1883 Section 5.2.3.5.c.
    see_also:
      - https://www.bsigroup.com/en-GB/CAV/pas-1883
    slot_uri: openlabel_v2:SignsWarning
    range: SignsWarningEnum

  # ---------------------------------------------------------------------------
  # ODD boolean slots
  # ---------------------------------------------------------------------------
  DaySunElevation:
    description: Elevation of the sun above the horizon flag. Refer to BSI PAS-1883 Section 5.3.3.a.1.
    see_also:
      - https://www.bsigroup.com/en-GB/CAV/pas-1883
