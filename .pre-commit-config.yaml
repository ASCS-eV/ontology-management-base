---
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check --fix
        language: system
        types: [python]
        pass_filenames: true

      - id: ruff-format
        name: ruff format
        entry: ruff format
        language: system
        types: [python]
        pass_filenames: true

      - id: generate-linkml
        name: Generate LinkML Artifacts
        entry: make generate
        language: system
        pass_filenames: false
        files: ^linkml/.*\.yaml$
        stages: [pre-commit]

      - id: jsonld-lint
        name: JSON-LD Parser
        entry: python -m src.tools.validators.syntax_validator --json
        language: system
        types: [json]
        files: \.(json|jsonld)$

      - id: turtle-lint
        name: Turtle Parser
        entry: python -m src.tools.validators.syntax_validator --turtle
        language: system
        types: [text]
        files: \.(ttl)$

      - id: update-context
        name: Update JSON-LD Contexts
        entry: python -m src.tools.utils.context_generator --all
        language: system
        pass_filenames: false
        files: ^artifacts/.*\.(owl\.ttl|shacl\.ttl)$
        stages: [pre-commit]

      - id: update-registry
        name: Update Ontology Registry and Catalog
        entry: python -m src.tools.utils.registry_updater
        language: system
        pass_filenames: false
        files: ^artifacts/.*\.(owl\.ttl|shacl\.ttl|context\.jsonld)$
        stages: [pre-commit]

      - id: update-properties
        name: Update Properties Documentation
        entry: python -m src.tools.utils.properties_updater
        language: system
        pass_filenames: false
        files: ^artifacts/.*\.(owl\.ttl|shacl\.ttl|context\.jsonld)$
        stages: [pre-commit]

      - id: update-readme
        name: Update README Catalog Table
        entry: python -m src.tools.utils.readme_updater
        language: system
        pass_filenames: false
        files: ^artifacts/.*\.(owl\.ttl|shacl\.ttl|context\.jsonld)$
        stages: [pre-commit]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: pretty-format-json
        args: ["--autofix", "--indent", "3", "--no-sort-keys"]
        files: \.(json|jsonld)$
      - id: mixed-line-ending
        args: ["--fix=lf"]
